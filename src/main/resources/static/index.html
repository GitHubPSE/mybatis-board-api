<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <title>영화 리뷰</title>
</head>
<body>
<div class="container mt-5">
  <div class="d-flex justify-content-end align-items-center gap-2 mb-2" id="authNav"></div>
  <div class="board-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="board-title mb-0">영화 리뷰</h5>
        <div class="d-flex align-items-center gap-2">
            <select id="pageSize" class="form-select" style="width:auto;">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="50">50</option>
            </select>
            <button id="write" type="button" class="btn btn-primary rounded-pill">글쓰기</button>
        </div>
    </div>
    <table class="table table-hover border-top border-dark">
        <thead>
            <tr class="border-bottom border-dark">
                <th style="width: 8%">번호</th>
                <th>제목</th>
                <th style="width: 8%">작성자</th>
                <th style="width: 15%">작성일</th>
                <th style="width: 8%">조회수</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
    <div class="d-flex justify-content-center mt-3" id="pagination"></div>
    <div class="d-flex justify-content-center gap-2 mt-2">
        <select id="searchType" class="form-select" style="width:auto;">
            <option value="title">제목</option>
            <option value="userId">작성자</option>
        </select>
        <input type="text" id="keyword" class="form-control" placeholder="검색어를 입력하세요" style="width:300px;">
        <button id="searchBtn" class="btn btn-outline-secondary rounded-pill px-3">검색</button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script>
    renderAuthNav();

    // URL 파라미터에서 페이지/검색 정보 가져오기
    const param = new URLSearchParams(window.location.search);
    const page = param.get('page') || 1;
    const pageSize = param.get('pageSize') || 10;
    const keyword = param.get('keyword') || '';
    const searchType = param.get('searchType') || 'title';

    // 초기값 설정
    $('#pageSize').val(pageSize);
    $('#searchType').val(searchType);
    $('#keyword').val(keyword);
    loadList(page);

    // 페이지 사이즈 변경 (검색 상태 유지)
    $('#pageSize').on('change', function() {
        location.href = buildUrl(1, $(this).val(), keyword, searchType);
    });

    // 뒤로가기 시 조회수 정상 조회용
    window.addEventListener('pageshow', function(){
        loadList(page);
    });

    // 검색 버튼
    $('#searchBtn').on('click', function() {
        location.href = buildUrl(1, pageSize, $('#keyword').val().trim(), $('#searchType').val());
    });

    // 엔터키로 검색
    $('#keyword').on('keydown', function(e) {
        if (e.key === 'Enter') $('#searchBtn').click();
    });

    // URL 생성 헬퍼
    function buildUrl(p, ps, kw, st) {
        let url = '/index.html?page=' + p + '&pageSize=' + ps;
        if (kw) url += '&keyword=' + encodeURIComponent(kw) + '&searchType=' + st;
        return url;
    }

    // 사용자 입력값(제목, 작성자)을 HTML에 끼워넣기 전에 이스케이프 처리
    // (안 하면 회원가입 아이디/게시글 제목에 <img onerror=...> 같은 걸 넣어서 XSS가 가능해짐)
    function escapeHtml(value) {
        return $('<div>').text(value).html();
    }

    // 게시글 목록 불러오기
    function loadList(page){
        let url = '/api/board/list?page=' + page + '&pageSize=' + $('#pageSize').val();
        if (keyword) url += '&keyword=' + encodeURIComponent(keyword) + '&searchType=' + searchType;

        $.ajax({
            url: url,
            type: 'GET',
            success:function(data){
                let html = '';
                if(data.list.length == 0){
                    html += '<tr><td colspan="5" class="text-center">게시글이 없습니다.</td></tr>'
                } else {
                    $.each(data.list, function(index, board){
                        html += '<tr>' +
                            '<td class="td-center">' + board.id + '</td>' +
                            '<td><a class="title-link" href="/detail.html?id=' + board.id + '">' + escapeHtml(board.title) + '</a></td>' +
                            '<td class="td-center text-nowrap">' + escapeHtml(board.userId) + '</td>' +
                            '<td class="td-center">' + board.regDate.slice(0, 16).replace('T', ' ') + '</td>' +
                            '<td class="td-center">' + board.viewCount + '</td>' +
                            '</tr>';
                    });
                }
                $('#list').html(html);
                renderPagination(data.totalPages, page);
            }
        });
    }

    // 페이징 (검색 상태 유지)
    function renderPagination(totalPages, page){
        let html = '<ul class="pagination">';
        for(let i = 1; i <= totalPages; i++){
            html += '<li class="page-item ' + (i == page ? 'active' : '') + '">' +
                '<a class="page-link rounded-0" href="' + buildUrl(i, pageSize, keyword, searchType) + '">' + i + '</a>' +
                '</li>';
        }
        html += "</ul>";
        $("#pagination").html(html);
    }

    // 글쓰기 버튼 (로그인 필요)
    $("#write").on("click", function(){
        if (!isLoggedIn()) {
            alert('로그인이 필요합니다.');
            location.href = '/login.html';
            return;
        }
        location.href = '/edit.html';
    });
</script>
</body>
</html>
