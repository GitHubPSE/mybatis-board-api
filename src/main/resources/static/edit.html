<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <title>게시글 작성/수정</title>
</head>
<body>
<div class="container mt-5">
  <div class="d-flex justify-content-end align-items-center gap-2 mb-2" id="authNav"></div>
  <div class="board-card">
    <div class="mb-3">
        <label for="title" class="form-label">제목</label>
        <input type="text" class="form-control" id="title">
    </div>
    <div class="mb-3">
        <label for="content" class="form-label">내용</label>
        <textarea class="form-control" id="content" rows="10"></textarea>
    </div>
    <div class="d-flex justify-content-end gap-2">
        <button id="cancel" type="button" class="btn btn-secondary btn-lg rounded-pill">취소</button>
        <button id="registration" type="button" class="btn btn-primary btn-lg rounded-pill"></button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script>
    renderAuthNav();

    // 로그인 안 했으면 글쓰기/수정 자체가 불가능하므로 바로 돌려보냄
    if (!isLoggedIn()) {
        alert('로그인이 필요합니다.');
        location.href = '/login.html';
    }

    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get("id");
    if(id == null) {
        // 버튼명 등록으로 변경
        $('#registration').text('등록');
    } else{
        // 버튼명 수정으로 변경
        $('#registration').text('수정');
        // 기존 게시글 불러오기
        $.ajax({
            url: `api/board/${id}`,
            type: 'GET',
            success: function (data) {
                // 작성자 본인이 아니면 수정 화면에 들어올 수 없음
                if (data.userId !== getLoginId()) {
                    alert('작성자만 수정할 수 있습니다.');
                    location.href = '/detail.html?id=' + id;
                    return;
                }
                $('#title').val(data.title);
                $('#content').val(data.content);
            }
        })
    }

    // 등록/수정 버튼 기능
    $('#registration').on('click', function () {
        const title = $('#title').val();
        const content = $('#content').val();

        if(title == null || title.trim() == ''){
            alert('제목을 입력해주세요.');
            return;
        }
        if(content == null || content.trim() == ''){
            alert('내용을 입력해주세요.');
            return;
        }

        if(id == null){
            // 등록
            $.ajax({
                url: 'api/board',
                type: 'POST',
                contentType: 'application/json',
                headers: authHeader(),
                data: JSON.stringify({
                    title : title,
                    content : content
                }),
                success: function() {
                    location.href = '/index.html';
                },
                error: function() {
                    alert('등록에 실패했습니다.');
                }
            })
        } else{
            // 수정
            $.ajax({
                url: 'api/board/' + id + '/update',
                type: 'PUT',
                contentType: 'application/json',
                headers: authHeader(),
                data: JSON.stringify({
                    title : title,
                    content : content
                }),
                success: function() {
                    location.href = '/detail.html?id=' + id;
                },
                error: function() {
                    alert('수정에 실패했습니다.')
                }
            });
        }
    })

    // 글자수 길이 제한 함수
    function getLength(value, maxLength) {
        let length = 0;
        let result = '';
        for(let i = 0; i < value.length; i++){
            length += value.charCodeAt(i) > 127 ? 2 : 1;
            if(length > maxLength){
                break;
            }
            result += value[i];
        }
        return result;
    }

    // 제목 길이 제한 (한글 50자, 영문 100자)
    $('#title').on('input', function() {
        this.value = getLength(this.value, 100);
    })

    // 취소 버튼 기능
    $('#cancel').on('click', function() {
        location.href = '/index.html';
    })
</script>
</body>
</html>
