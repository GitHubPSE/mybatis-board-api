<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>게시글 작성/수정</title>
</head>
<body>
<div class="container mt-5">
    <div class="row mb-3">
        <div class="col-9">
            <label for="title" class="form-label">제목</label>
            <input type="text" class="form-control" id="title">
        </div>
        <div class="col-3">
            <label for="author" class="form-label">작성자명</label>
            <input type="text" class="form-control" id="author">
        </div>
    </div>
    <div class="mb-3">
        <label for="content" class="form-label">내용</label>
        <textarea class="form-control" id="content" rows="10"></textarea>
    </div>
    <div class="row align-items-start mb-3">
        <div class="col-auto">
            <label for="password" class="form-label">비밀번호</label>
            <input type="password" class="form-control" id="password" maxlength="4">
            <small class="text-muted">* 숫자 4자리로 구성해주세요.</small>
        </div>
        <div class="col d-flex justify-content-end gap-2">
            <button id="cancel" type="button" class="btn btn-secondary btn-lg rounded-0">취소</button>
            <button id="registration" type="button" class="btn btn-primary btn-lg rounded-0"></button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get("id");
    if(id == null) {
        // 버튼명 등록으로 변경
        $('#registration').text('등록');
    } else{
        // 버튼명 수정으로 변경
        $('#registration').text('수정');
        // 기존 게시글 불러오기
        $.ajax({
            url: `api/board/${id}`,
            type: 'GET',
            success: function (data) {
                $('#title').val(data.title);
                $('#content').val(data.content);
                $('#author').val(data.author);
            }
        })
    }

    // 등록/수정 버튼 기능
    $('#registration').on('click', function () {
        const title = $('#title').val();
        const content = $('#content').val();
        const author = $('#author').val();
        const password = $('#password').val();

        if(title == null || title.trim() == ''){
            alert('제목을 입력해주세요.');
            return;
        }
        if(content == null || content.trim() == ''){
            alert('내용을 입력해주세요.');
            return;
        }
        if(author == null || author.trim() == ''){
            alert('작성자명을 입력해주세요.');
            return;
        }
        if(password.length != 4){
            alert('비밀번호는 4자리 숫자로 입력해주세요.');
            return;
        }

        if(id == null){
            // 등록
            $.ajax({
                url: 'api/board',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    title : title,
                    content : content,
                    author : author,
                    password : password
                }),
                success: function() {
                    location.href = '/index.html';
                },
                error: function() {
                    alert('등록에 실패했습니다.');
                }
            })
        } else{
            // 수정
            $.ajax({
                url: 'api/board/' + id + '/update',
                type: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify({
                    title : title,
                    content : content,
                    author : author,
                    password : password
                }),
                success: function() {
                    location.href = '/detail.html?id=' + id;
                },
                error: function() {
                    alert('수정에 실패했습니다.')
                }
            });
        }
    })

    // 비밀번호 숫자만 입력 가능
    $('#password').on('input', function() {
        this.value = this.value.replace(/[^0-9]/g, '');
    })

    // 글자수 길이 제한 함수
    function getLength(value, maxLength) {
        let length = 0;
        let result = '';
        for(let i = 0; i < value.length; i++){
            length += value.charCodeAt(i) > 127 ? 2 : 1;
            if(length > maxLength){
                break;
            }
            result += value[i];
        }
        return result;
    }

    // 제목 길이 제한 (한글 50자, 영문 100자)
    $('#title').on('input', function() {
        this.value = getLength(this.value, 100);
    })

    // 작성자명 길이 제한 (한글 10자)
    $('#author').on('input', function() {
        this.value = getLength(this.value, 20);
    })

    // 취소 버튼 기능
    $('#cancel').on('click', function() {
        location.href = '/index.html';
    })
</script>
</body>
</html>
