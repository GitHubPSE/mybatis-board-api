<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <title>게시글 본문</title>
</head>
<body>
<div class="container mt-5">
  <div class="board-card">
    <div class="board-detail-header">
        <span class="board-detail-id">#<span id="id"></span></span>
        <h2 class="board-detail-title" id="title"></h2>
        <div class="board-detail-meta">
            <span>작성자 <strong id="author"></strong></span>
            <span>작성일 <strong id="regDate"></strong></span>
            <span>수정일 <strong id="updateDate"></strong></span>
            <span>조회수 <strong id="viewCount"></strong></span>
        </div>
    </div>
    <div class="board-detail-content" id="content"></div>
    <div class="d-flex justify-content-between mt-3">
        <button id="list" type="button" class="btn btn-secondary btn-lg rounded-pill">목록</button>
        <div class="d-flex gap-2">
            <button id="delete" type="button" class="btn btn-secondary btn-lg rounded-pill">삭제</button>
            <button id="edit" type="button" class="btn btn-primary btn-lg rounded-pill">수정</button>
        </div>
    </div>
  </div>
</div>

<div class="modal fade" id="passwordModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">비밀번호 확인</h5>
            </div>
            <div class="modal-body">
                <input id="password" type="password" class="form-control" maxlength="4" placeholder="4자리 숫자 입력">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">취소</button>
                <button type="button" class="btn btn-primary rounded-pill" id="confirm">확인</button>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get("id");

    // 게시글 불러오기
    $.ajax({
        url:'/api/board/' + id,
        type: 'GET',
        success: function (data) {
            $('#id').text(data.id);
            $('#title').text(data.title);
            $('#author').text(data.author);
            $('#viewCount').text(data.viewCount);
            $('#regDate').text(data.regDate.slice(0, 16).replace('T', ' '));
            $('#content').text(data.content);
            if(data.updateDate != null){
                $('#updateDate').text(data.updateDate.slice(0, 16).replace('T', ' '));
            }else{
                $('#updateDate').text('-');
            }
        }
    });

    // 목록 버튼
    $('#list').on('click', function () {
        history.back();
    })

    let modalAction = '';
    // 수정 버튼
    $('#edit').on('click', function () {
        modalAction = 'edit';
        $('#password').val('');
        new bootstrap.Modal(document.getElementById('passwordModal')).show();
    })

    // 삭제 버튼
    $('#delete').on('click', function () {
        modalAction = 'delete';
        $('#password').val('');
        new bootstrap.Modal(document.getElementById('passwordModal')).show();
    })

    // 비밀번호 숫자만 입력 가능
    $('#password').on('input', function() {
        this.value = this.value.replace(/[^0-9]/g, '');
    })

    // 모달 확인 버튼
    $('#confirm').on('click', function () {
        const password = $('#password').val();
        if(password.length != 4){
            alert('비밀번호 4자리를 입력해주세요.');
            return;
        }

        $.ajax({
            url:'/api/board/' + id + '/password',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                password : password
            }),
            success: function (data) {
               if(data == true){
                   if(modalAction == 'edit'){
                       location.href = '/edit.html?id=' + id;
                   }else if(modalAction == 'delete'){
                       $.ajax({
                           url:'/api/board/' + id + '/delete',
                           type: 'PATCH',
                           success: function () {
                               alert('삭제가 정상적으로 되었습니다.');
                               location.href = '/index.html';
                           },
                           error: function () {
                               alert('삭제에 실패했습니다.');
                           }
                       });
                   }
               } else {
                   alert('비밀번호가 일치하지 않습니다.');
               }
            }
        });
    })
</script>
</body>
</html>
