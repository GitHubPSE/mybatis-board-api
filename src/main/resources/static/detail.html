<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <title>게시글 본문</title>
</head>
<body>
<div class="container mt-5">
  <div class="d-flex justify-content-end align-items-center gap-2 mb-2" id="authNav"></div>
  <div class="board-card">
    <div class="board-detail-header">
        <span class="board-detail-id">#<span id="id"></span></span>
        <h2 class="board-detail-title" id="title"></h2>
        <div class="board-detail-meta">
            <span>작성자 <strong id="author"></strong></span>
            <span>작성일 <strong id="regDate"></strong></span>
            <span>수정일 <strong id="updateDate"></strong></span>
            <span>조회수 <strong id="viewCount"></strong></span>
        </div>
    </div>
    <div class="board-detail-content" id="content"></div>
    <div class="d-flex justify-content-between mt-3">
        <button id="list" type="button" class="btn btn-secondary btn-lg rounded-pill">목록</button>
        <div class="gap-2" id="ownerActions" style="display: none;">
            <button id="delete" type="button" class="btn btn-secondary btn-lg rounded-pill">삭제</button>
            <button id="edit" type="button" class="btn btn-primary btn-lg rounded-pill">수정</button>
        </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script>
    renderAuthNav();

    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get("id");

    // 게시글 불러오기
    $.ajax({
        url:'/api/board/' + id,
        type: 'GET',
        success: function (data) {
            $('#id').text(data.id);
            $('#title').text(data.title);
            $('#author').text(data.userId);
            $('#viewCount').text(data.viewCount);
            $('#regDate').text(data.regDate.slice(0, 16).replace('T', ' '));
            $('#content').text(data.content);
            if(data.updateDate != null){
                $('#updateDate').text(data.updateDate.slice(0, 16).replace('T', ' '));
            }else{
                $('#updateDate').text('-');
            }

            // 작성자 본인일 때만 수정/삭제 버튼 노출
            if (isLoggedIn() && data.userId === getLoginId()) {
                // d-flex는 Bootstrap에서 !important로 정의돼 있어 인라인 display:none을
                // 덮어써버린다. 그래서 d-flex 클래스 없이 display만 JS로 직접 제어한다.
                $('#ownerActions').css('display', 'flex');
            }
        }
    });

    // 목록 버튼
    $('#list').on('click', function () {
        history.back();
    })

    // 수정 버튼
    $('#edit').on('click', function () {
        location.href = '/edit.html?id=' + id;
    })

    // 삭제 버튼
    $('#delete').on('click', function () {
        if (!confirm('정말 삭제하시겠습니까?')) {
            return;
        }

        $.ajax({
            url:'/api/board/' + id + '/delete',
            type: 'PATCH',
            headers: authHeader(),
            success: function () {
                alert('삭제가 정상적으로 되었습니다.');
                location.href = '/index.html';
            },
            error: function () {
                alert('삭제에 실패했습니다.');
            }
        });
    })
</script>
</body>
</html>
