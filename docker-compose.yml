services:
  db:
    image: postgres:16-alpine
    container_name: board-db
    environment:
      POSTGRES_DB: ${DB_NAME:-board}
      POSTGRES_USER: ${DB_USERNAME:-board}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-board}
    ports:
      - "5432:5432"
    volumes:
      - board-db-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    image: ghcr.io/githubpse/mybatis-board-api-app:latest
    build: .
    container_name: board-app
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-board}
      DB_USERNAME: ${DB_USERNAME:-board}
      DB_PASSWORD: ${DB_PASSWORD:-board}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
    depends_on:
      - db
    ports:
      - "8080:8080"


volumes:
  board-db-data:
